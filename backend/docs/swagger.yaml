basePath: /api
definitions:
  models.Client:
    properties:
      cpf:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      name:
        type: string
      pin:
        description: PIN de 4 digitos em texto simples ou hash (recomendado hash)
        type: string
      providerID:
        type: integer
      updatedAt:
        type: string
    type: object
host: ispdown.proserv.net.br
info:
  contact:
    email: suporte@ispdown.com
    name: Suporte ISPDown
  description: API para gestão de arquivos e integração com ERP de provedores de internet.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: ISPDown API
  version: "1.0"
paths:
  /admin/change-password:
    post:
      consumes:
      - application/json
      description: Troca a senha do provedor logado.
      parameters:
      - description: Nova senha (new_password)
        in: body
        name: passwords
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Altera senha do administrador
      tags:
      - auth
  /admin/clients:
    get:
      consumes:
      - application/json
      description: Retorna uma lista de clientes. Usado também pelo painel administrativo.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Client'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Lista todos os clientes do provedor
      tags:
      - clients
    post:
      consumes:
      - application/json
      description: Registra um cliente vinculando ao provedor logado.
      parameters:
      - description: Dados do Cliente (name, cpf, pin)
        in: body
        name: client
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Client'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cria um novo cliente
      tags:
      - clients
  /admin/clients/{id}:
    delete:
      consumes:
      - application/json
      description: Remove o cliente e também os arquivos vinculados a ele do banco
        e do disco. (Para casos de cancelamento no ERP).
      parameters:
      - description: ID do Cliente
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Apaga um cliente definitivamente
      tags:
      - clients
  /admin/clients/{id}/status:
    put:
      consumes:
      - application/json
      description: Altera o status IsActive de um cliente (ERP pode usar para bloquear
        inadimplentes).
      parameters:
      - description: ID do Cliente
        in: path
        name: id
        required: true
        type: integer
      - description: Status (isActive)
        in: body
        name: status
        required: true
        schema:
          additionalProperties:
            type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Ativa ou suspende um cliente
      tags:
      - clients
  /admin/login:
    post:
      consumes:
      - application/json
      description: Retorna token JWT de acesso ao painel do provedor ou ERP.
      parameters:
      - description: Credenciais (username, password)
        in: body
        name: credentials
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Realiza login de administrador
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
