version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ispdown-db
    environment:
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_password
      POSTGRES_DB: ispdown
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: xingubit/ispdown-backend:latest
    container_name: ispdown-backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=isp_user
      - DB_PASSWORD=isp_password
      - DB_NAME=ispdown
      - JWT_SECRET=${JWT_SECRET}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - /var/isp-transfer/uploads:/app/uploads
    depends_on:
      - db
    restart: always

  frontend:
    image: xingubit/ispdown-frontend:latest
    container_name: ispdown-frontend
    depends_on:
      - backend
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: ispdown-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    command: sh -c 'echo "$$DOMAIN { reverse_proxy /api/* backend:8080; reverse_proxy * frontend:80 }" > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile'
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
  caddy_data:
  caddy_config:
